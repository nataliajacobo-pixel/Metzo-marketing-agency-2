<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metzo | Contact</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="header"></div>

<main class="container my-5">
  <h1 class="text-center mb-4">Contact Us</h1>

  <form class="card p-4 mx-auto" style="max-width: 600px;">
    <div class="mb-3">
      <label class="form-label">Full name</label>
      <input type="text" class="form-control" placeholder="Write your name">
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" placeholder="example@email.com">
    </div>

    <div class="mb-3">
      <label class="form-label">Message</label>
      <textarea class="form-control" rows="5" placeholder="Write your message"></textarea>
    </div>

    <button type="submit" class="btn btn-metzo">Send message</button>
  </form>
</main>

<div id="footer"></div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
