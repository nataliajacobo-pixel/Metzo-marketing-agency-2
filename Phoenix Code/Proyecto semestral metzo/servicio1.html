<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brand Identity</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div id="header"></div>

<main class="container my-5 text-center">

  <h1 class="mb-5">Brand Identity</h1>

    src="https://www.ringcentral.com/gb/en/blog/wp-content/uploads/2021/05/happy-manager-leads-a-meeting-in-the-office-640x427.jpg"

  >

  </p>

  <a href="contacto.html" class="btn btn-metzo">
    Contact us
  </a>

</main>

<style>
.btn-metzo {
  background: linear-gradient(135deg, #0f2027, #134e5e, #3b82f6);
  color: white;
  border: none;
  border-radius: 14px;
  padding: 12px 30px;
  font-weight: 600;
  letter-spacing: 0.5px;
  transition: all 0.3s ease;
}

.btn-metzo:hover {
  background: linear-gradient(135deg, #1e3c72, #2a5298, #60a5fa);
  transform: translateY(-3px);
  color: white;
  box-shadow: 0 8px 18px rgba(59, 130, 246, 0.35);

</style>
